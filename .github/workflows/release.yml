name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish under, for example v0.1.0"
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            label: macos-arm64
            rust-target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
          - os: macos-15-intel
            label: macos-x64
            rust-target: x86_64-apple-darwin
            tauri-args: --target x86_64-apple-darwin
          - os: windows-latest
            label: windows-x64
            rust-target: ""
            tauri-args: ""
          - os: ubuntu-22.04
            label: linux-x64
            rust-target: ""
            # Only build the native bundles. AppImage is skipped: linuxdeploy
            # cannot self-extract on FUSE-less GitHub-hosted runners and dies
            # silently ("failed to run linuxdeploy") even with libfuse2 +
            # APPIMAGE_EXTRACT_AND_RUN set. .deb/.rpm cover Linux users.
            tauri-args: --bundles deb,rpm

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage desktop resources
        run: pnpm build:desktop-resources

      - name: Set version from tag
        # Make the release tag the single source of truth for the build version.
        # Tauri bakes tauri.conf.json's version into every bundle filename, so
        # without this a v0.1.1 release would still emit Finora_0.1.0_* files and
        # a latest.json advertising 0.1.1 over a 0.1.0 bundle (update loop). This
        # stamps the tag's version into all three manifests before building.
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: node scripts/set-version.mjs "${RELEASE_TAG#v}"

      - name: Build Tauri app
        run: pnpm exec tauri build ${{ matrix.tauri-args }} --verbose
        env:
          # Signs the updater artifacts (.app.tar.gz / -setup.exe) with the minisign
          # key whose public half is embedded in tauri.conf.json. Add it as a
          # repository secret; without it the .sig files are not produced and
          # auto-update has nothing to verify against. The key was generated without
          # a password, so no password secret is needed.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Disambiguate macOS updater bundle name
        # Both macOS architectures emit an identically named "Finora.app.tar.gz",
        # which would collide once artifacts are merged. Rename each per-arch so the
        # updater manifest can reference them individually. Renaming does not affect
        # the signature, which is computed over the file contents.
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          arch="${{ matrix.rust-target == 'aarch64-apple-darwin' && 'aarch64' || 'x64' }}"
          dir="src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos"
          for ext in ".app.tar.gz" ".app.tar.gz.sig"; do
            src="$dir/Finora$ext"
            if [ -f "$src" ]; then
              mv "$src" "$dir/Finora_${arch}$ext"
              echo "Renamed Finora$ext -> Finora_${arch}$ext"
            fi
          done

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.label }}
          if-no-files-found: error
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/**/*.sig

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: find artifacts -maxdepth 3 -type f -print | sort

      - name: Create stable download names
        # Tauri bakes the version into every filename (e.g. Finora_0.1.0_aarch64.dmg),
        # which would break any "latest build" download link on each release. Copy each
        # build to a version-less name alongside the originals so the README can link to
        # https://github.com/liar1974/finora/releases/latest/download/<stable-name> and
        # always get the newest build. The versioned originals are still published too.
        run: |
          set -euo pipefail
          shopt -s nullglob
          copy_first() {
            local pattern="$1" dest="artifacts/$2"
            local matches=( $pattern )
            if [ ${#matches[@]} -eq 0 ]; then
              echo "WARNING: no file matched $pattern (skipping $2)"
              return
            fi
            cp "${matches[0]}" "$dest"
            echo "Stable copy: ${matches[0]} -> $dest"
          }
          copy_first "artifacts/*_aarch64.dmg"   "Finora-macOS-AppleSilicon.dmg"
          copy_first "artifacts/*_x64.dmg"       "Finora-macOS-Intel.dmg"
          copy_first "artifacts/*-setup.exe"     "Finora-Windows-Setup.exe"
          copy_first "artifacts/*_amd64.deb"     "Finora-Linux-x86_64.deb"

      - name: Generate updater manifest
        # Builds latest.json from the signed updater artifacts. The desktop app's
        # updater endpoint points at releases/latest/download/latest.json, so this
        # file must ship with every release for one-click auto-update to work.
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
          ARTIFACTS_DIR: artifacts
        run: node scripts/generate-latest-json.mjs

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Finora ${{ github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: artifacts/**/*
          fail_on_unmatched_files: true
          body: |
            Finora desktop unsigned builds.

            **Download the latest build directly:**

            - macOS (Apple Silicon): [Finora-macOS-AppleSilicon.dmg](https://github.com/liar1974/finora/releases/latest/download/Finora-macOS-AppleSilicon.dmg)
            - macOS (Intel): [Finora-macOS-Intel.dmg](https://github.com/liar1974/finora/releases/latest/download/Finora-macOS-Intel.dmg)
            - Windows: [Finora-Windows-Setup.exe](https://github.com/liar1974/finora/releases/latest/download/Finora-Windows-Setup.exe)
            - Linux (Debian/Ubuntu): [Finora-Linux-x86_64.deb](https://github.com/liar1974/finora/releases/latest/download/Finora-Linux-x86_64.deb)

            Versioned files and extra formats (.msi, .rpm) are attached below.

            macOS builds are unsigned. On first launch, use right-click Open if Gatekeeper blocks the app.

            Windows builds are unsigned. SmartScreen may show a warning; choose More info, then Run anyway.

            Linux builds are provided as native Tauri bundle outputs when generated by the Linux runner.
