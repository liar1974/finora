name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish under, for example v0.1.0"
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            label: macos-arm64
            rust-target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
          - os: macos-15-intel
            label: macos-x64
            rust-target: x86_64-apple-darwin
            tauri-args: --target x86_64-apple-darwin
          - os: windows-latest
            label: windows-x64
            rust-target: ""
            tauri-args: ""
          - os: ubuntu-22.04
            label: linux-x64
            rust-target: ""
            tauri-args: ""

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage desktop resources
        run: pnpm build:desktop-resources

      - name: Build Tauri app
        run: pnpm exec tauri build ${{ matrix.tauri-args }}

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.label }}
          if-no-files-found: error
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/rpm/*.rpm

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List release assets
        run: find artifacts -maxdepth 3 -type f -print | sort

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Finora ${{ github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: artifacts/**/*
          fail_on_unmatched_files: true
          body: |
            Finora desktop unsigned builds.

            macOS builds are unsigned. On first launch, use right-click Open if Gatekeeper blocks the app.

            Windows builds are unsigned. SmartScreen may show a warning; choose More info, then Run anyway.

            Linux builds are provided as native Tauri bundle outputs when generated by the Linux runner.
